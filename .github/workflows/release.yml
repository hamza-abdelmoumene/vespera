name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-22.04
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libgl1-mesa-dev libfuse2 wget file

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          cache: true

      - name: Fetch linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

      - name: Build AppImage
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build
          DESTDIR="$PWD/AppDir" cmake --install build
          export QML_SOURCES_PATHS="$PWD/qml"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage \
            --desktop-file packaging/vespera.desktop --icon-file packaging/icons/vespera.svg
          mv Vespera*.AppImage "vespera-${GITHUB_REF_NAME}-x86_64.AppImage"

      - name: Source tarball
        run: |
          v="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="vespera-$v/" -o "vespera-$v.tar.gz" HEAD

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            vespera-*-x86_64.AppImage
            vespera-*.tar.gz
